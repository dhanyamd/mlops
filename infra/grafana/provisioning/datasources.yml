apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      # Correlate Loki logs with Prometheus metrics by time
      derivedFields:
        - datasourceUid: "prometheus"
          matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: "http://localhost:16686/trace/${__value.raw}"
