version: 2

models:
  - name: stg_demand__sales
    description: "Staged raw sales table from Clickhouse"
    columns:
      - name: date
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: quantity_sold
        tests:
          - not_null

  - name: stg_demand__products
    description: "Staged product catalog from Postgres mapped table"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_demand__promotions
    description: "Staged catalog promotions table from Postgres mapped table"
    columns:
      - name: promotion_id
        tests:
          - unique
          - not_null
