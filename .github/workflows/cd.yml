name: Continuous Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'fraud_detection/**'
      - 'demand_forecasting/**'
      - 'shared/**'
      - 'Dockerfile.api'
      - 'Dockerfile.training'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/mlops-fraud-api:latest,${{ steps.login-ecr.outputs.registry }}/mlops-fraud-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Training image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.training
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/mlops-training:latest,${{ steps.login-ecr.outputs.registry }}/mlops-training:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
